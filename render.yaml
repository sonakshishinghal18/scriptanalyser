services:
  # ── Backend (Python FastAPI) ──────────────────────────────
  - type: web
    name: scriptforge-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your frontend URL after first deploy
    healthCheckPath: /health
    autoDeploy: true

  # ── Frontend (static HTML/CSS/JS) ────────────────────────
  - type: web
    name: scriptforge-frontend
    runtime: static
    rootDir: frontend
    buildCommand: echo "No build step needed"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
